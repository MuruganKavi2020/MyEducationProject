<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTech Center | Learn & Innovate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80'); background-size: cover; color: white; padding: 100px 0; }
        .card { transition: 0.3s; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <header class="hero-section text-center">
        <h1>Welcome to EduTech Academy...</h1>
        <p class="lead">Where Innovation Meets Education</p>
    </header>

    <div class="container my-5">
        <h2 class="text-center mb-5">Our Programs</h2>
        <div class="row g-4" id="services">
            </div>
    </div>

    <script>
        const services = [
            { title: "School Tuition", desc: "Expert coaching for 5th to 12th standard students.", icon: "📚" },
            { title: "Microcontroller Projects", desc: "Practical hands-on training with Arduino & IoT.", icon: "🤖" },
            { title: "Programming & Web", desc: "Master Python, Java, and Modern Web Designing.", icon: "💻" },
            { title: "Physical Activities", desc: "Holistic development with sports and fitness.", icon: "🏃" }
        ];

        const container = document.getElementById('services');
        services.forEach(item => {
            container.innerHTML += `
                <div class="col-md-3">
                    <div class="card p-4 text-center h-100">
                        <div style="font-size: 50px;">${item.icon}</div>
                        <h4>${item.title}</h4>
                        <p>${item.desc}</p>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
